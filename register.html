<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regist page</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="background">
      <img
        src="images/wallpapersden.com_starry-sky-hd-dark-blue-night_2912x1632.jpg"
        alt="Background Image"
        class="background__image"
      />
    </div>


    <div class="login-container">
    <form class="login-form" action="">
      <h1 class="login-form__title">Register</h1>

    <div class="login-form__group">
      <label for="firstName" class="login-form__label">
        <i class="login-form__icon fa-solid fa-user"></i>
        <input
          class="login-form__input"
          placeholder="Enter your first name"
          type="text"
          id="firstName"
          required
        />
      </label>
    </div>

    <div class="login-form__group">
        <label for="lastName" class="login-form__label">
          <i class="login-form__icon fa-solid fa-user"></i>
          <input
            class="login-form__input"
            placeholder="Enter your last name"
            type="text"
            id="lastName"
            required
          />
        </label>
      </div>

      <div class="login-form__group">
        <label for="email" class="login-form__label">
        <i class="login-form__icon fa-solid fa-envelope"></i>
          <input
            class="login-form__input"
            placeholder="Enter your email"
            type="text"
            id="email"
            required
          />
        </label>
      </div>

    <div class="login-form__group">
      <label for="password" class="login-form__label">
        <i class="login-form__icon fa-solid fa-lock"></i>
        <input
          class="login-form__input"
          placeholder="Enter your password"
          id="password"
          type="password"
          required
        />
      </label>
    </div>

      <button class="login-form__button" id="registerButton" type="submit">Register</button>

      <div class="login-form__footer">
      <p class="login-form__text">
        Don't have an account?  
        <a href="index.html" class="login-form__link" action="submit" >Sign in</a>
      </p>
    </div>
  </form>
  </div>
  <script src="script.js"></script>
  </body>
</html>
