<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>


  <body>
    <div class="background">
      <img
        src="images/wallpapersden.com_starry-sky-hd-dark-blue-night_2912x1632.jpg"
        alt="Background Image"
        class="background__image"
      />
    </div>


    <div class="login-container">
    <form class="login-form" action="">
      <h1 class="login-form__title">Login</h1>

    <div class="login-form__group">
      <label for="username" class="login-form__label">
        <i class="login-form__icon fa-solid fa-user"></i>
        <input
          class="login-form__input"
          placeholder="Enter your username"
          type="text"
          id="username"
          required
        />
      </label>
    </div>

    <div class="login-form__group">
      <label for="password" class="login-form__label">
        <i class="login-form__icon fa-solid fa-lock"></i>
        <input
        id="password"
          class="login-form__input"
          placeholder="Enter your password"
          type="password"
          id="password"
          required
        />
      </label>
    </div>

      <button class="login-form__button" id="buttom" type="submit" >Login</button>

      <div class="login-form__footer">
      <p class="login-form__text">
        Don't have an account?  
        <a href="register.html" class="login-form__link">Sign up</a>
      </p>
    </div>
  </form>
  </div>
  </body>
</html>
